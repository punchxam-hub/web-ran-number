<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RANNUMNER - MEMBER ACCESS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* LOGIN SCREEN */

#loginPage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top,
#0c2b0c,
#050505 60%);
}

.login-box{
width:100%;
max-width:420px;
background:#0f0f0f;
border:1px solid #1eff5a33;
border-radius:25px;
padding:35px;
text-align:center;
box-shadow:
0 0 25px #00ff4430;
}

.logo{
font-size:70px;
font-weight:900;
color:#00ff4c;
text-shadow:
0 0 15px #00ff4c;
margin-bottom:10px;
}

.brand{
font-size:34px;
font-weight:bold;
letter-spacing:2px;
color:#00ff4c;
}

.member{
font-size:14px;
letter-spacing:4px;
margin-top:5px;
opacity:.8;
margin-bottom:25px;
}

.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#151515;
color:white;
font-size:16px;
outline:none;
border:1px solid #1b1b1b;
}

.input-box input:focus{
border:1px solid #00ff4c;
box-shadow:
0 0 15px #00ff4c40;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#00ff4c;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.register-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#111;
color:#00ff4c;
font-size:16px;
cursor:pointer;
margin-top:12px;
border:1px solid #00ff4c;
}

.package{
margin-top:20px;
background:#111;
padding:20px;
border-radius:18px;
text-align:left;
}

.package h3{
margin-bottom:12px;
color:#00ff4c;
}

.package p{
margin:8px 0;
font-size:15px;
}

/* APP */

#app{
display:none;
padding:25px;
}

.topbar{
text-align:center;
margin-bottom:20px;
}

.topbar h1{
font-size:34px;
color:#00ff4c;
text-shadow:
0 0 15px #00ff4c;
}

.topbar p{
opacity:.7;
margin-top:5px;
}

textarea{
width:100%;
height:120px;
background:#101010;
border:1px solid #00ff4c33;
border-radius:18px;
padding:20px;
color:white;
font-size:38px;
text-align:center;
resize:none;
outline:none;
margin-top:20px;
}

.button-group{
display:flex;
gap:12px;
margin:20px 0;
flex-wrap:wrap;
}

.button-group button{
flex:1;
padding:16px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.reset{
background:#222;
color:white;
}

.calculate{
background:#00ff4c;
color:black;
}

.grid{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:18px;
}

.card{
background:#111;
padding:18px;
border-radius:18px;
border:1px solid #1eff5a22;
}

.card h2{
margin-bottom:12px;
color:#00ff4c;
font-size:22px;
}

.result{
background:#050505;
padding:14px;
border-radius:14px;
min-height:90px;
margin-bottom:12px;
font-size:18px;
word-wrap:break-word;
}

.copy-btn{
width:100%;
padding:14px;
background:#00ff4c;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

textarea{
font-size:28px;
}

}

</style>
</head>

<body>

  html id="w95j7s"
<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<div class="logo">RN</div>

<div class="brand">
RANNUMNER
</div>

<div class="member">
MEMBER ACCESS
</div>

<div class="input-box">
<input
type="text"
id="username"
placeholder="Username">
</div>

<div class="input-box">
<input
type="password"
id="password"
placeholder="Password">
</div>

<button
class="login-btn"
onclick="login()">
LOGIN
</button>

<button
class="register-btn"
onclick="openLine()">
สมัครสมาชิก
</button>

<div class="package">

<h3>MEMBERSHIP</h3>

<p>1 เดือน — 159฿</p>
<p>3 เดือน — 399฿</p>
<p>5 เดือน — 599฿</p>
<p>1 ปี — 1,290฿</p>

</div>

</div>

</div>

<!-- APP -->

<div id="app">

<div class="topbar">
<h1>RANNUMNER</h1>
<p>MEMBER ACCESS</p>
</div>

<textarea
id="numberInput"
placeholder="ใส่ตัวเลข"></textarea>

<div class="button-group">

<button
class="reset"
onclick="resetData()">
เริ่มใหม่
</button>

<button
class="calculate"
onclick="calculate()">
คำนวณ
</button>

</div>

<div class="grid">

<div class="card">
<h2>2 ตัวปกติ</h2>
<div
class="result"
id="twoNormal"></div>

<button
class="copy-btn"
onclick="copyText('twoNormal')">
คัดลอก
</button>
</div>

<div class="card">
<h2>2 ตัวรวมเบิ้ล</h2>
<div
class="result"
id="twoDouble"></div>

<button
class="copy-btn"
onclick="copyText('twoDouble')">
คัดลอก
</button>
</div>

<div class="card">
<h2>3 ตัวปกติ</h2>
<div
class="result"
id="threeNormal"></div>

<button
class="copy-btn"
onclick="copyText('threeNormal')">
คัดลอก
</button>
</div>

<div class="card">
<h2>3 ตัวรวมตอง</h2>
<div
class="result"
id="threeSpecial"></div>

<button
class="copy-btn"
onclick="copyText('threeSpecial')">
คัดลอก
</button>
</div>

</div>

</div>
html id="6dq5ur"
<script>

/* USERS */

const users = {

"member01":{
password:"1234",
expire:"2026-12-31"
},

"vip01":{
password:"9999",
expire:"2026-10-10"
}

};

/* LOGIN */

function login(){

let username =
document.getElementById(
'username'
).value;

let password =
document.getElementById(
'password'
).value;

if(!users[username]){

alert(
'ไม่พบผู้ใช้งาน'
);

return;
}

if(
users[username]
.password
!== password
){

alert(
'รหัสผ่านไม่ถูกต้อง'
);

return;
}

let today =
new Date();

let expire =
new Date(
users[username]
.expire
);

if(today > expire){

alert(
'สมาชิกหมดอายุ กรุณาต่ออายุ'
);

return;
}

document.getElementById(
'loginPage'
).style.display =
'none';

document.getElementById(
'app'
).style.display =
'block';

}

/* OPEN LINE */

function openLine(){

window.open(
'https://lin.ee/SR7nkfm',
'_blank'
);

}

/* CALCULATE */

function calculate(){

let num =
document.getElementById(
'numberInput'
).value
.replace(/\s/g,'');

let twoNormal = [];

for(
let i=0;
i<num.length;
i++
){

for(
let j=i+1;
j<num.length;
j++
){

twoNormal.push(
num[i] +
num[j]
);

}

}

let doubles = [
'00','11','22',
'33','44','55',
'66','77','88',
'99'
];

let twoDouble =
[
...doubles,
...twoNormal
];

let threeNormal =
[];

for(
let i=0;
i<num.length;
i++
){

for(
let j=i+1;
j<num.length;
j++
){

for(
let k=j+1;
k<num.length;
k++
){

threeNormal.push(
num[i]+
num[j]+
num[k]
);

}

}

}

let tong = [
'000','111','222',
'333','444','555',
'666','777','888',
'999'
];

document.getElementById(
'twoNormal'
).innerText =
twoNormal.join(' ');

document.getElementById(
'twoDouble'
).innerText =
twoDouble.join(' ');

document.getElementById(
'threeNormal'
).innerText =
threeNormal.join(' ');

document.getElementById(
'threeSpecial'
).innerText =
[
...tong,
...threeNormal
].join(' ');

}

/* RESET */

function resetData(){

document.getElementById(
'numberInput'
).value='';

document.getElementById(
'twoNormal'
).innerText='';

document.getElementById(
'twoDouble'
).innerText='';

document.getElementById(
'threeNormal'
).innerText='';

document.getElementById(
'threeSpecial'
).innerText='';

}

/* COPY */

function copyText(id){

let text =
document.getElementById(id)
.innerText;

navigator.clipboard
.writeText(text);

alert(
'คัดลอกแล้ว'
);

}

</script>

</body>
</html>
