<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RANNUMNER</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#111111;
--sub:#6e6e73;
--line:#e5e5e7;
--green:#22c55e;
--shadow:0 8px 30px rgba(0,0,0,.06);
}

body.dark{
--bg:#111315;
--card:#1c1c1e;
--text:#ffffff;
--sub:#b3b3b8;
--line:#2a2a2d;
--shadow:none;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
}

.container{
max-width:1180px;
margin:auto;
padding:25px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo-box{
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:58px;
height:58px;
border-radius:18px;
background:linear-gradient(
135deg,
#22c55e,
#16a34a
);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:24px;
color:#fff;
}

.brand h1{
font-size:28px;
font-weight:700;
}

.brand p{
font-size:14px;
color:var(--sub);
letter-spacing:2px;
}

.theme-btn{
border:none;
background:var(--card);
border:1px solid var(--line);
width:52px;
height:52px;
border-radius:18px;
cursor:pointer;
font-size:22px;
box-shadow:var(--shadow);
}

.login-card{
max-width:520px;
margin:auto;
background:var(--card);
padding:35px;
border-radius:34px;
box-shadow:var(--shadow);
border:1px solid var(--line);
}

.login-card h2{
font-size:28px;
margin-bottom:5px;
}

.login-card p{
color:var(--sub);
margin-bottom:25px;
}

.input{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid var(--line);
background:transparent;
font-size:16px;
margin-bottom:14px;
outline:none;
color:var(--text);
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.login-btn{
background:#111;
color:#fff;
margin-bottom:10px;
}

body.dark .login-btn{
background:#fff;
color:#111;
}

.line-btn{
background:#22c55e;
color:#fff;
}

.package-box{
margin-top:25px;
background:var(--bg);
border-radius:24px;
padding:22px;
border:1px solid var(--line);
}

.package-box h3{
margin-bottom:15px;
}

.package{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid var(--line);
}

.package:last-child{
border-bottom:none;
}

#app{
display:none;
}

.input-number{
width:100%;
height:120px;
border-radius:28px;
padding:20px;
font-size:42px;
border:1px solid var(--line);
background:var(--card);
color:var(--text);
outline:none;
resize:none;
box-shadow:var(--shadow);
text-align:center;
}

.action{
display:flex;
gap:12px;
margin:20px 0 28px;
}

.action button{
flex:1;
padding:18px;
border:none;
border-radius:22px;
cursor:pointer;
font-size:16px;
font-weight:600;
}

.reset{
background:#ef4444;
color:#fff;
}

.calc{
background:#22c55e;
color:#fff;
}

.grid{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:20px;
}

.card{
background:var(--card);
border-radius:28px;
padding:24px;
box-shadow:var(--shadow);
border:1px solid var(--line);
}

.card h3{
margin-bottom:15px;
}

.result{
background:var(--bg);
border-radius:18px;
padding:18px;
min-height:90px;
margin-bottom:14px;
word-break:break-word;
}

.copy{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#22c55e;
color:#fff;
cursor:pointer;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.input-number{
font-size:30px;
}

}

</style>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


</head>
<body>

<div class="container">

<div class="topbar">

<div class="logo-box">

<div class="logo">
RN
</div>

<div class="brand">
<h1>RANNUMNER</h1>
<p>MEMBER ACCESS</p>
</div>

</div>

<button
class="theme-btn"
onclick="toggleTheme()">
🌙
</button>

</div>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-card">

<h2>Welcome Back</h2>

<p>
เข้าสู่ระบบสมาชิก
RANNUMNER
</p>

<input
type="text"
class="input"
id="username"
placeholder="Username">

<input
type="password"
class="input"
id="password"
placeholder="Password">

<button
class="btn login-btn"
onclick="login()">
Login
</button>

<button
class="btn line-btn"
onclick="openLine()">
สมัครสมาชิก
</button>

<div class="package-box">

<h3>Membership</h3>

<div class="package">
<span>1 เดือน</span>
<strong>159฿</strong>
</div>

<div class="package">
<span>3 เดือน</span>
<strong>399฿</strong>
</div>

<div class="package">
<span>5 เดือน</span>
<strong>599฿</strong>
</div>

<div class="package">
<span>1 ปี</span>
<strong>1,290฿</strong>
</div>

</div>

</div>

</div>

<!-- APP -->

<div id="app">
  
```html
<div style="margin-bottom:20px;">


<input
type="file"
id="imageInput"
accept="image/*"
style="display:none;"
onchange="scanImage()">

<button
onclick="document.getElementById('imageInput').click()"
class="btn line-btn">

📷 สแกนเลขจากรูป

</button>

<p
id="scanStatus"
style="
margin-top:10px;
font-size:14px;
color:gray;">
</p>

```

<textarea
id="numberInput"
class="input-number"
placeholder="ใส่ตัวเลข"></textarea>

<div class="action">

<button
class="reset"
onclick="resetData()">
เริ่มใหม่
</button>

<button
class="calc"
onclick="calculate()">
คำนวณ
</button>

</div>

<div class="grid">

<div class="card">
<h3>2 ตัวปกติ</h3>
<div
class="result"
id="twoNormal">
</div>

<button
class="copy"
onclick="copyText('twoNormal')">
คัดลอก
</button>
</div>

<div class="card">
<h3>2 ตัวรวมเบิ้ล</h3>
<div
class="result"
id="twoDouble">
</div>

<button
class="copy"
onclick="copyText('twoDouble')">
คัดลอก
</button>
</div>

<div class="card">
<h3>3 ตัวปกติ</h3>
<div
class="result"
id="threeNormal">
</div>

<button
class="copy"
onclick="copyText('threeNormal')">
คัดลอก
</button>
</div>

<div class="card">
<h3>3 ตัวรวมตอง</h3>
<div
class="result"
id="threeSpecial">
</div>

<button
class="copy"
onclick="copyText('threeSpecial')">
คัดลอก
</button>
</div>

</div>

</div>

<script>

/* USERS */

const users = {

"member01":{
password:"1234",
expire:"2026-12-31"
},

"vip01":{
password:"9999",
expire:"2026-10-10"
}

};

/* LOGIN */

function login(){

const username =
document.getElementById(
'username'
).value.trim();

const password =
document.getElementById(
'password'
).value.trim();

if(!users[username]){
alert('ไม่พบผู้ใช้งาน');
return;
}

if(
users[username]
.password !== password
){
alert('รหัสผ่านไม่ถูกต้อง');
return;
}

const today =
new Date();

const expire =
new Date(
users[username]
.expire
);

if(today > expire){
alert(
'สมาชิกหมดอายุ กรุณาต่ออายุ'
);
return;
}

document.getElementById(
'loginPage'
).style.display =
'none';

document.getElementById(
'app'
).style.display =
'block';

}

/* LINE OA */

function openLine(){

window.open(
'https://lin.ee/SR7nkfm',
'_blank'
);

}

/* DARK MODE */

function toggleTheme(){

document.body
.classList
.toggle('dark');

}

/* CALCULATE */

function calculate(){

let num =
document
.getElementById(
'numberInput'
)
.value
.replace(/\s/g,'');

if(num.length < 2){
alert(
'กรุณาใส่ตัวเลข'
);
return;
}

/* 2 ตัว */

let twoNormal =
[];

for(
let i=0;
i<num.length;
i++
){

for(
let j=i+1;
j<num.length;
j++
){

twoNormal.push(
num[i]+num[j]
);

}

}

/* เบิ้ล */

const doubles = [

'00','11',
'22','33',
'44','55',
'66','77',
'88','99'

];

let twoDouble =

[
...doubles,
...twoNormal
];

/* 3 ตัว */

let threeNormal =
[];

for(
let i=0;
i<num.length;
i++
){

for(
let j=i+1;
j<num.length;
j++
){

for(
let k=j+1;
k<num.length;
k++
){

threeNormal.push(

num[i]+
num[j]+
num[k]

);

}

}

}

/* ตอง */

const tong = [

'000',
'111',
'222',
'333',
'444',
'555',
'666',
'777',
'888',
'999'

];

document
.getElementById(
'twoNormal'
)
.innerText =

twoNormal.join(
' '
);

document
.getElementById(
'twoDouble'
)
.innerText =

twoDouble.join(
' '
);

document
.getElementById(
'threeNormal'
)
.innerText =

threeNormal.join(
' '
);

document
.getElementById(
'threeSpecial'
)
.innerText =

[
...tong,
...threeNormal
].join(' ');

}

/* RESET */

function resetData(){

document
.getElementById(
'numberInput'
)
.value='';

document
.getElementById(
'twoNormal'
)
.innerText='';

document
.getElementById(
'twoDouble'
)
.innerText='';

document
.getElementById(
'threeNormal'
)
.innerText='';

document
.getElementById(
'threeSpecial'
)
.innerText='';

}

/* COPY */

function copyText(id){

const text =

document
.getElementById(id)
.innerText;

navigator
.clipboard
.writeText(text);

alert(
'คัดลอกแล้ว'
);

}

</script>

</div>

</body>
</html>
